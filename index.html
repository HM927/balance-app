<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>残高管理アプリ</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <h1 class="app-title">残高管理アプリ</h1>

        <section class="card settings-card">
            <h2>基本情報の設定</h2>

            <div>
                <label for="balanceInput">現在の残高</label>
                <input id="balanceInput" type="number">
            </div>

            <div>
                <label for="baseDateInput">基準日</label>
                <input id="baseDateInput" type="date">
            </div>

            <button id="saveButton">保存</button>
        </section>

        <section class="card balance-card">
            <h2>保存した内容</h2>

            <p class="balance-value"><span class="balance-label">現在の残高</span><span id="balanceDisplay">未設定</span></p>
            <p class="base-date">基準日：<span id="baseDateDisplay">未設定</span></p>
        </section>

        <section class="card calculator-card">
            <h2>指定日残高の計算</h2>

            <div>
                <label for="targetDateInput">残高確認日</label>
                <input id="targetDateInput" type="date">
            </div>

            <button id="calculateBalanceButton">計算</button>

            <p class="calculated-balance">指定日時点の残高：<span id="calculatedBalanceDisplay">未設定</span></p>
        </section>

        <section class="card transaction-form-card">
            <h2>収支の登録</h2>

            <div>
                <label for="transactionType">種別</label>
                <select id="transactionType">
                    <option value="income">収入</option>
                    <option value="expense">支出</option>
                </select>
            </div>

            <div>
                <label for="transactionDate">日付</label>
                <input id="transactionDate" type="date">
            </div>

            <div>
                <label for="transactionAmount">金額</label>
                <input id="transactionAmount" type="number">
            </div>

            <div>
                <label for="transactionMemo">メモ</label>
                <input id="transactionMemo" type="text">
            </div>

            <button id="addTransactionButton">追加</button>
        </section>

        <section class="card transaction-list-card">
            <h2>収支一覧</h2>
            <ul id="transactionList"></ul>
        </section>

        <script src="index.js"></script>
    </body>
</html>
